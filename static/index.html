<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sermon Search</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0f0e0c;
        --surface: #1a1814;
        --border: #2e2b24;
        --gold: #c9a84c;
        --gold-dim: #7a6330;
        --text: #e8e0d0;
        --text-dim: #8a8070;
        --user-bg: #1e1c18;
        --bot-bg: #161412;
        --radius: 4px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: "Cormorant Garamond", Georgia, serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 28px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
        background: var(--surface);
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .logo-cross {
        width: 22px;
        height: 22px;
        position: relative;
        flex-shrink: 0;
      }

      .logo-cross::before,
      .logo-cross::after {
        content: "";
        position: absolute;
        background: var(--gold);
      }

      .logo-cross::before {
        width: 2px;
        height: 100%;
        left: 50%;
        transform: translateX(-50%);
      }

      .logo-cross::after {
        width: 100%;
        height: 2px;
        top: 35%;
        transform: translateY(-50%);
      }

      .logo-text {
        font-size: 1.25rem;
        font-weight: 300;
        letter-spacing: 0.12em;
        color: var(--text);
        text-transform: uppercase;
      }

      .logo-text span {
        color: var(--gold);
      }

      .stats {
        font-family: "DM Mono", monospace;
        font-size: 0.7rem;
        color: var(--text-dim);
        letter-spacing: 0.05em;
      }

      /* ── Tab bar ── */
      .tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        flex-shrink: 0;
      }

      .tab {
        padding: 10px 24px;
        font-family: "DM Mono", monospace;
        font-size: 0.72rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
        background: none;
        border-top: none;
        border-left: none;
        border-right: none;
      }

      .tab:hover {
        color: var(--text);
      }
      .tab.active {
        color: var(--gold);
        border-bottom-color: var(--gold);
      }

      /* ── Main layout ── */
      .main {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      /* ── Chat panel ── */
      .chat-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px 28px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      .messages::-webkit-scrollbar {
        width: 4px;
      }
      .messages::-webkit-scrollbar-track {
        background: transparent;
      }
      .messages::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      /* welcome state */
      .welcome {
        margin: auto;
        text-align: center;
        max-width: 480px;
        opacity: 0;
        animation: fadeIn 0.6s ease 0.2s forwards;
      }

      .welcome-cross {
        width: 40px;
        height: 40px;
        position: relative;
        margin: 0 auto 20px;
      }

      .welcome-cross::before,
      .welcome-cross::after {
        content: "";
        position: absolute;
        background: var(--gold-dim);
      }

      .welcome-cross::before {
        width: 2px;
        height: 100%;
        left: 50%;
        transform: translateX(-50%);
      }
      .welcome-cross::after {
        width: 100%;
        height: 2px;
        top: 35%;
        transform: translateY(-50%);
      }

      .welcome h2 {
        font-size: 1.8rem;
        font-weight: 300;
        letter-spacing: 0.06em;
        color: var(--text);
        margin-bottom: 10px;
      }

      .welcome p {
        font-size: 1rem;
        color: var(--text-dim);
        line-height: 1.7;
        font-style: italic;
      }

      .suggestions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
        margin-top: 24px;
      }

      .suggestion {
        padding: 8px 14px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        font-family: "DM Mono", monospace;
        font-size: 0.68rem;
        color: var(--text-dim);
        cursor: pointer;
        transition: all 0.2s;
        text-align: left;
        background: none;
      }

      .suggestion:hover {
        border-color: var(--gold-dim);
        color: var(--gold);
      }

      /* message bubbles */
      .message {
        display: flex;
        gap: 12px;
        max-width: 800px;
        opacity: 0;
        animation: slideUp 0.3s ease forwards;
      }

      .message.user {
        align-self: flex-end;
        flex-direction: row-reverse;
      }
      .message.bot {
        align-self: flex-start;
      }

      .msg-avatar {
        width: 30px;
        height: 30px;
        border-radius: 2px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "DM Mono", monospace;
        font-size: 0.65rem;
        flex-shrink: 0;
        margin-top: 2px;
      }

      .message.user .msg-avatar {
        background: var(--border);
        color: var(--text-dim);
      }

      .message.bot .msg-avatar {
        background: var(--gold-dim);
        color: var(--bg);
        font-weight: bold;
      }

      .msg-content {
        padding: 14px 18px;
        border-radius: var(--radius);
        font-size: 1rem;
        line-height: 1.75;
        max-width: 640px;
      }

      .message.user .msg-content {
        background: var(--user-bg);
        border: 1px solid var(--border);
        color: var(--text);
      }

      .message.bot .msg-content {
        background: var(--bot-bg);
        border: 1px solid var(--border);
        color: var(--text);
      }

      .msg-meta {
        font-family: "DM Mono", monospace;
        font-size: 0.65rem;
        color: var(--text-dim);
        margin-top: 6px;
        letter-spacing: 0.04em;
      }

      /* typing indicator */
      .typing {
        display: flex;
        gap: 5px;
        padding: 14px 18px;
        background: var(--bot-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        width: fit-content;
      }

      .typing span {
        width: 6px;
        height: 6px;
        background: var(--gold-dim);
        border-radius: 50%;
        animation: pulse 1.2s ease-in-out infinite;
      }

      .typing span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing span:nth-child(3) {
        animation-delay: 0.4s;
      }

      /* ── Sources sidebar ── */
      .sources-panel {
        width: 300px;
        border-left: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex-shrink: 0;
        background: var(--surface);
      }

      .sources-header {
        padding: 14px 18px;
        border-bottom: 1px solid var(--border);
        font-family: "DM Mono", monospace;
        font-size: 0.7rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-dim);
      }

      .sources-list {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      .source-card {
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        cursor: pointer;
        transition: border-color 0.2s;
      }

      .source-card:hover {
        border-color: var(--gold-dim);
      }

      .source-card-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 6px;
      }

      .source-type {
        font-family: "DM Mono", monospace;
        font-size: 0.6rem;
        padding: 2px 6px;
        border-radius: 2px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }

      .source-type.sermon {
        background: #1a2030;
        color: #6090d0;
      }
      .source-type.scripture {
        background: #1a2518;
        color: #50a060;
      }

      .source-score {
        font-family: "DM Mono", monospace;
        font-size: 0.62rem;
        color: var(--text-dim);
      }

      .source-title {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 3px;
        line-height: 1.3;
      }

      .source-date {
        font-family: "DM Mono", monospace;
        font-size: 0.62rem;
        color: var(--gold-dim);
        margin-bottom: 6px;
      }

      .source-preview {
        font-size: 0.78rem;
        color: var(--text-dim);
        line-height: 1.5;
        font-style: italic;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }

      .sources-empty {
        padding: 24px;
        text-align: center;
        color: var(--text-dim);
        font-style: italic;
        font-size: 0.9rem;
      }

      /* ── Search panel ── */
      .search-panel {
        flex: 1;
        padding: 28px;
        overflow-y: auto;
        display: none;
      }

      .search-panel.active {
        display: block;
      }
      .chat-panel.hidden {
        display: none;
      }

      .search-box {
        display: flex;
        gap: 10px;
        margin-bottom: 24px;
      }

      .search-results {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .result-card {
        padding: 18px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--surface);
        opacity: 0;
        animation: slideUp 0.3s ease forwards;
      }

      .result-card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 10px;
      }

      .result-body {
        font-size: 0.95rem;
        line-height: 1.75;
        color: var(--text);
      }

      /* ── Input bar ── */
      .input-bar {
        padding: 16px 28px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 10px;
        background: var(--surface);
        flex-shrink: 0;
      }

      input[type="text"],
      textarea {
        flex: 1;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 12px 16px;
        color: var(--text);
        font-family: "Cormorant Garamond", serif;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s;
        resize: none;
      }

      input[type="text"]:focus,
      textarea:focus {
        border-color: var(--gold-dim);
      }

      input[type="text"]::placeholder,
      textarea::placeholder {
        color: var(--text-dim);
        font-style: italic;
      }

      button.send-btn {
        padding: 12px 20px;
        background: var(--gold-dim);
        border: none;
        border-radius: var(--radius);
        color: var(--bg);
        font-family: "DM Mono", monospace;
        font-size: 0.72rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        transition: background 0.2s;
        flex-shrink: 0;
      }

      button.send-btn:hover {
        background: var(--gold);
      }
      button.send-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* ── Animations ── */
      @keyframes fadeIn {
        to {
          opacity: 1;
        }
      }
      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 0.3;
          transform: scale(0.8);
        }
        50% {
          opacity: 1;
          transform: scale(1);
        }
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <div class="logo-cross"></div>
        <div class="logo-text">Sermon <span>Search</span></div>
      </div>
      <div class="stats" id="stats">loading...</div>
    </header>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('chat')">Chat</button>
      <button class="tab" onclick="switchTab('search')">Search</button>
    </div>

    <div class="main">
      <!-- Chat panel -->
      <div class="chat-panel" id="chatPanel">
        <div class="messages" id="messages">
          <div class="welcome" id="welcome">
            <div class="welcome-cross"></div>
            <h2>Sermon Search</h2>
            <p>
              Ask anything about the sermon messages — topics, scriptures,
              teachings, or specific dates.
            </p>
            <div class="suggestions">
              <button class="suggestion" onclick="useSuggestion(this)">
                What does the pastor teach about prayer?
              </button>
              <button class="suggestion" onclick="useSuggestion(this)">
                How should we treat people who hurt us?
              </button>
              <button class="suggestion" onclick="useSuggestion(this)">
                What does it mean to take action in faith?
              </button>
              <button class="suggestion" onclick="useSuggestion(this)">
                Scriptures about renewal and new creation
              </button>
              <button class="suggestion" onclick="useSuggestion(this)">
                What was the sermon on March 8, 2026?
              </button>
            </div>
          </div>
        </div>

        <div class="input-bar">
          <input
            type="text"
            id="chatInput"
            placeholder="Ask about a sermon, topic, or scripture…"
            onkeydown="
              if (event.key === 'Enter' && !event.shiftKey) {
                sendMessage();
              }
            "
          />
          <button class="send-btn" id="sendBtn" onclick="sendMessage()">
            Send
          </button>
        </div>
      </div>

      <!-- Sources sidebar (chat mode) -->
      <div class="sources-panel" id="sourcesPanel">
        <div class="sources-header">Sources</div>
        <div class="sources-list" id="sourcesList">
          <div class="sources-empty">
            Sources will appear here after your first question.
          </div>
        </div>
      </div>

      <!-- Search panel -->
      <div class="search-panel" id="searchPanel">
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            placeholder="Search sermon transcripts…"
            onkeydown="
              if (event.key === 'Enter') {
                doSearch();
              }
            "
          />
          <button class="send-btn" onclick="doSearch()">Search</button>
        </div>
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>

    <script>
      const API = ""; // same origin
      let history = [];
      let isLoading = false;

      // ── Stats ──────────────────────────────────────────────────────────────────────
      async function loadStats() {
        try {
          const r = await fetch(`${API}/api/stats`);
          const d = await r.json();
          document.getElementById("stats").textContent =
            `${d.total_chunks} chunks · ${d.collection}`;
        } catch (e) {
          document.getElementById("stats").textContent = "offline";
        }
      }
      loadStats();

      // ── Tab switching ──────────────────────────────────────────────────────────────
      function switchTab(tab) {
        document
          .querySelectorAll(".tab")
          .forEach((t, i) =>
            t.classList.toggle("active", ["chat", "search"][i] === tab),
          );
        document
          .getElementById("chatPanel")
          .classList.toggle("hidden", tab !== "chat");
        document.getElementById("sourcesPanel").style.display =
          tab === "chat" ? "" : "none";
        document
          .getElementById("searchPanel")
          .classList.toggle("active", tab === "search");
      }

      // ── Suggestions ────────────────────────────────────────────────────────────────
      function useSuggestion(el) {
        document.getElementById("chatInput").value = el.textContent;
        sendMessage();
      }

      // ── Chat ───────────────────────────────────────────────────────────────────────
      function appendMessage(role, text) {
        const welcome = document.getElementById("welcome");
        if (welcome) welcome.remove();

        const wrap = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = `message ${role}`;

        const avatar = role === "user" ? "YOU" : "✝";
        div.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div>
      <div class="msg-content">${text.replace(/\n/g, "<br>")}</div>
    </div>`;
        wrap.appendChild(div);
        wrap.scrollTop = wrap.scrollHeight;
        return div;
      }

      function showTyping() {
        const welcome = document.getElementById("welcome");
        if (welcome) welcome.remove();

        const wrap = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "message bot";
        div.id = "typing";
        div.innerHTML = `
    <div class="msg-avatar">✝</div>
    <div class="typing"><span></span><span></span><span></span></div>`;
        wrap.appendChild(div);
        wrap.scrollTop = wrap.scrollHeight;
      }

      function removeTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
      }

      function renderSources(sources) {
        const list = document.getElementById("sourcesList");
        if (!sources || sources.length === 0) {
          list.innerHTML = '<div class="sources-empty">No sources found.</div>';
          return;
        }
        list.innerHTML = sources
          .map(
            (s, i) => `
    <div class="source-card" style="animation-delay:${i * 0.05}s">
      <div class="source-card-header">
        <span class="source-type ${s.chunk_type}">${s.chunk_type}</span>
        <span class="source-score">${(s.score * 100).toFixed(0)}%</span>
      </div>
      <div class="source-title">${s.title}</div>
      <div class="source-date">${s.date}</div>
      <div class="source-preview">${s.preview}</div>
    </div>`,
          )
          .join("");
      }

      async function sendMessage() {
        if (isLoading) return;
        const input = document.getElementById("chatInput");
        const msg = input.value.trim();
        if (!msg) return;

        input.value = "";
        isLoading = true;
        document.getElementById("sendBtn").disabled = true;

        appendMessage("user", msg);
        history.push({ role: "user", content: msg });

        showTyping();

        try {
          const res = await fetch(`${API}/api/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message: msg,
              history: history.slice(0, -1),
            }),
          });
          const data = await res.json();
          removeTyping();

          if (data.error) {
            appendMessage("bot", `Error: ${data.error}`);
          } else {
            appendMessage("bot", data.answer);
            history.push({ role: "assistant", content: data.answer });
            renderSources(data.sources);
          }
        } catch (e) {
          removeTyping();
          appendMessage(
            "bot",
            "Sorry, I could not connect to the server. Please check that the backend is running.",
          );
        }

        isLoading = false;
        document.getElementById("sendBtn").disabled = false;
        input.focus();
      }

      // ── Raw Search ─────────────────────────────────────────────────────────────────
      async function doSearch() {
        const input = document.getElementById("searchInput");
        const query = input.value.trim();
        if (!query) return;

        const results = document.getElementById("searchResults");
        results.innerHTML =
          '<div style="color:var(--text-dim);font-style:italic;padding:12px">Searching…</div>';

        try {
          const res = await fetch(`${API}/api/search`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ query, n: 8 }),
          });
          const data = await res.json();

          if (!data.results || data.results.length === 0) {
            results.innerHTML =
              '<div style="color:var(--text-dim);font-style:italic;padding:12px">No results found.</div>';
            return;
          }

          results.innerHTML = data.results
            .map(
              (r, i) => `
      <div class="result-card" style="animation-delay:${i * 0.04}s">
        <div class="result-card-header">
          <span class="source-type ${r.chunk_type}">${r.chunk_type}</span>
          <span class="source-score" style="font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--text-dim)">${(r.score * 100).toFixed(0)}% match</span>
          <span style="font-family:'DM Mono',monospace;font-size:0.62rem;color:var(--gold-dim)">${r.date}</span>
        </div>
        <div class="source-title" style="font-size:0.95rem;margin-bottom:10px">${r.title}</div>
        <div class="result-body">${r.text}</div>
      </div>`,
            )
            .join("");
        } catch (e) {
          results.innerHTML =
            '<div style="color:var(--text-dim)">Connection error.</div>';
        }
      }
    </script>
  </body>
</html>
